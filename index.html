<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLARIS — Solar System Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Exo+2:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#00000a;
  --hud-bg:rgba(2,10,26,0.88);
  --hud-border:rgba(160,220,255,0.22);
  --hud-border-hi:rgba(0,200,255,0.55);
  --accent:#00d4ff;
  --accent2:#ff7040;
  --accent3:#a0ff80;
  --text:#cce8f8;
  --muted:#4a7a9b;
  --dim:#2a4a5a;
  --success:#30d070;
  --font-d:'Orbitron',monospace;
  --font-b:'Exo 2',sans-serif;
  --pr:12px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font-b);color:var(--text);cursor:crosshair;user-select:none}
#cv{position:fixed;inset:0;z-index:0}
#cv canvas{display:block;width:100%!important;height:100%!important}
#scan{position:fixed;inset:0;z-index:5;pointer-events:none;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);opacity:.35}
#hud{position:fixed;inset:0;z-index:10;pointer-events:none}
#top{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;
  padding:13px 22px;background:linear-gradient(180deg,rgba(0,5,18,.95) 0%,transparent 100%)}
.logo{font-family:var(--font-d);font-size:15px;font-weight:900;letter-spacing:.18em;color:var(--accent);text-shadow:0 0 24px rgba(0,212,255,.7)}
.logo em{color:#fff;font-style:normal}
#strow{display:flex;align-items:center;gap:14px;font-family:var(--font-d);font-size:10px;letter-spacing:.1em;color:var(--muted)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
#tdisp{font-family:var(--font-d);font-size:11px;color:var(--accent);letter-spacing:.08em}
.corner{position:absolute;width:28px;height:28px;border-color:var(--accent);border-style:solid;opacity:.28}
.c-tl{top:58px;left:10px;border-width:2px 0 0 2px;border-radius:4px 0 0 0}
.c-tr{top:58px;right:10px;border-width:2px 2px 0 0;border-radius:0 4px 0 0}
.c-bl{bottom:76px;left:10px;border-width:0 0 2px 2px;border-radius:0 0 0 4px}
.c-br{bottom:76px;right:10px;border-width:0 2px 2px 0;border-radius:0 0 4px 0}
#lpanel{position:absolute;left:16px;top:64px;bottom:88px;width:200px;
  display:flex;flex-direction:column;gap:7px;pointer-events:all;overflow-y:auto;scrollbar-width:none;padding-right:2px}
#lpanel::-webkit-scrollbar{display:none}
.ptitle{font-family:var(--font-d);font-size:9px;letter-spacing:.2em;color:var(--muted);
  text-transform:uppercase;padding:0 0 7px;border-bottom:1px solid var(--hud-border);margin-bottom:2px}
.pbtn{display:flex;align-items:center;gap:8px;padding:7px 11px;
  background:var(--hud-bg);border:1px solid var(--hud-border);border-radius:7px;
  cursor:pointer;transition:all .18s;font-family:var(--font-b);font-size:12px;
  color:var(--text);text-align:left;width:100%;backdrop-filter:blur(8px)}
.pbtn:hover{border-color:var(--accent);background:rgba(0,212,255,.09);color:#fff}
.pbtn.active{border-color:var(--accent);background:rgba(0,212,255,.16);color:var(--accent);box-shadow:0 0 14px rgba(0,212,255,.22)}
.pdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.pau{margin-left:auto;font-size:9px;color:var(--muted);font-family:var(--font-d)}
.rtag{font-size:7px;color:var(--accent2);font-family:var(--font-d);border:1px solid var(--accent2);
  padding:1px 4px;border-radius:8px;letter-spacing:.04em;flex-shrink:0}
#ipanel{position:absolute;right:16px;top:64px;width:270px;
  background:var(--hud-bg);border:1px solid var(--hud-border);border-radius:var(--pr);
  padding:18px 18px 16px;pointer-events:all;backdrop-filter:blur(14px);
  transition:opacity .3s,transform .3s;opacity:0;transform:translateX(18px);
  max-height:calc(100vh - 120px);overflow-y:auto;scrollbar-width:none}
#ipanel::-webkit-scrollbar{display:none}
#ipanel.vis{opacity:1;transform:translateX(0)}
.aibadge{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-family:var(--font-d);
  letter-spacing:.1em;color:var(--accent2);border:1px solid var(--accent2);
  padding:3px 8px;border-radius:20px;margin-bottom:11px}
.abdot{width:5px;height:5px;border-radius:50%;background:var(--accent2);animation:blink 1.5s infinite}
.ipname{font-family:var(--font-d);font-size:19px;font-weight:900;color:#fff;margin-bottom:3px;letter-spacing:.05em}
.iptype{font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px}
.ipdiv{height:1px;background:var(--hud-border);margin:10px 0}
.iprow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;gap:8px}
.ipkey{color:var(--muted);font-size:9px;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
.ipval{color:#fff;font-family:var(--font-d);font-size:10.5px;font-weight:600;text-align:right}
.ipval.hi{color:var(--accent)}
.retro-box{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--accent2);
  background:rgba(255,112,64,.08);border:1px solid rgba(255,112,64,.28);
  border-radius:6px;padding:6px 10px;margin-top:8px}
.ipdesc{font-size:11px;color:var(--muted);line-height:1.68;margin-top:10px;font-style:italic}
#bbar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:9px;
  background:var(--hud-bg);border:1px solid var(--hud-border);
  border-radius:40px;padding:9px 18px;pointer-events:all;backdrop-filter:blur(14px);white-space:nowrap}
.cbtn{display:flex;align-items:center;justify-content:center;width:33px;height:33px;
  background:transparent;border:1px solid var(--hud-border);border-radius:50%;
  cursor:pointer;color:var(--text);font-size:13px;transition:all .18s;font-family:inherit;flex-shrink:0}
.cbtn:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 10px rgba(0,212,255,.25)}
.cbtn.active{background:rgba(0,212,255,.15);border-color:var(--accent);color:var(--accent)}
.cbtn.rbtn{border-color:rgba(255,112,64,.4);color:var(--accent2);font-size:11px;width:auto;padding:0 12px;border-radius:16px}
.cbtn.rbtn:hover{border-color:var(--accent2);box-shadow:0 0 10px rgba(255,112,64,.3)}
.cdiv{width:1px;height:20px;background:var(--hud-border);flex-shrink:0}
.spdis{font-family:var(--font-d);font-size:10px;color:var(--accent);min-width:42px;text-align:center;letter-spacing:.06em}
#spsl{-webkit-appearance:none;appearance:none;width:72px;height:3px;border-radius:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));outline:none;cursor:pointer;flex-shrink:0}
#spsl::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;
  border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);cursor:pointer}
#dlbtn{position:absolute;top:16px;right:16px;display:none;align-items:center;gap:7px;
  padding:7px 14px;background:var(--hud-bg);border:1px solid rgba(160,255,128,.38);
  border-radius:20px;cursor:pointer;pointer-events:all;
  font-family:var(--font-d);font-size:9px;letter-spacing:.1em;
  color:var(--accent3);transition:all .2s;backdrop-filter:blur(8px)}
#dlbtn:hover{border-color:var(--accent3);box-shadow:0 0 12px rgba(160,255,128,.3)}
#tip{position:fixed;background:var(--hud-bg);border:1px solid var(--accent);
  border-radius:6px;padding:5px 11px;font-family:var(--font-d);font-size:10px;
  color:var(--accent);letter-spacing:.08em;pointer-events:none;display:none;z-index:20;
  white-space:nowrap;backdrop-filter:blur(8px)}
#fring{position:fixed;border:1.5px solid var(--accent);border-radius:50%;
  pointer-events:none;z-index:15;opacity:0;transition:opacity .3s;
  animation:spnrng 5s linear infinite;
  box-shadow:0 0 18px rgba(0,212,255,.4),inset 0 0 12px rgba(0,212,255,.08)}
@keyframes spnrng{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
#load{position:fixed;inset:0;background:#000;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;transition:opacity .9s}
#load.gone{opacity:0;pointer-events:none}
.llogo{font-family:var(--font-d);font-size:30px;font-weight:900;color:var(--accent);
  text-shadow:0 0 48px rgba(0,212,255,.9);letter-spacing:.25em}
.lsub{font-family:var(--font-d);font-size:9px;letter-spacing:.3em;color:var(--muted);margin-top:-10px}
.lbar{width:260px;height:2px;background:rgba(0,212,255,.12);border-radius:1px;overflow:hidden}
.lbf{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:1px;animation:lprog 2s ease forwards}
@keyframes lprog{0%{width:0}100%{width:100%}}
.ltxt{font-family:var(--font-d);font-size:9px;letter-spacing:.2em;color:var(--dim);animation:blink 1.2s infinite}
</style>
</head>
<body>
<div id="load">
  <div class="llogo">☀ SOLARIS</div>
  <div class="lsub">SOLAR SYSTEM EXPLORER v2.0</div>
  <div class="lbar"><div class="lbf"></div></div>
  <div class="ltxt">INITIALIZING WEBGL ENGINE...</div>
</div>

<div id="cv"></div>
<div id="scan"></div>

<div id="hud">
  <div class="corner c-tl"></div><div class="corner c-tr"></div>
  <div class="corner c-bl"></div><div class="corner c-br"></div>
  <div id="top">
    <div class="logo">☀ <em>SOLARIS</em> EXPLORER</div>
    <div id="strow"><div class="sdot"></div><span>SIMULATION ACTIVE</span><span id="tdisp">T+00:00:00</span></div>
  </div>
  <button id="dlbtn" title="Download this file">⬇ DOWNLOAD</button>
  <div id="lpanel"><div class="ptitle">Navigation</div></div>
  <div id="ipanel">
    <div class="aibadge"><div class="abdot"></div>AI ANALYSIS</div>
    <div class="ipname" id="ip-nm">—</div>
    <div class="iptype" id="ip-ty">—</div>
    <div id="ip-cb" style="height:3px;border-radius:2px;margin-bottom:13px"></div>
    <div class="iprow"><span class="ipkey">Diameter</span><span class="ipval" id="ip-dm">—</span></div>
    <div class="iprow"><span class="ipkey">Surface Area</span><span class="ipval hi" id="ip-sa">—</span></div>
    <div class="iprow"><span class="ipkey">Orbital Period</span><span class="ipval" id="ip-op">—</span></div>
    <div class="iprow"><span class="ipkey">Distance from Sun</span><span class="ipval" id="ip-ds">—</span></div>
    <div class="iprow"><span class="ipkey">Avg Temperature</span><span class="ipval" id="ip-tm">—</span></div>
    <div class="iprow"><span class="ipkey">Moons</span><span class="ipval" id="ip-mn">—</span></div>
    <div class="iprow"><span class="ipkey">Spin Direction</span><span class="ipval" id="ip-rt">—</span></div>
    <div id="ip-rb" class="retro-box" style="display:none">↺ RETROGRADE ROTATION</div>
    <div class="ipdiv"></div>
    <div class="ipdesc" id="ip-dc">—</div>
  </div>
  <div id="bbar">
    <button class="cbtn" id="bp" title="Pause/Play">⏸</button>
    <div class="cdiv"></div>
    <button class="cbtn" id="bsl" title="Slower">◀◀</button>
    <input type="range" id="spsl" min="0.1" max="10" step="0.1" value="1">
    <button class="cbtn" id="bfa" title="Faster">▶▶</button>
    <span class="spdis" id="spld">1.0×</span>
    <div class="cdiv"></div>
    <button class="cbtn active" id="bor" title="Toggle Orbits">⊙</button>
    <button class="cbtn active" id="blb" title="Toggle Labels">◎</button>
    <div class="cdiv"></div>
    <button class="cbtn rbtn" id="brs" title="Full Reset">⌖ RESET</button>
  </div>
</div>

<div id="tip"></div>
<div id="fring"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════
// PLANET DATA
// retrograde: Venus & Uranus spin in reverse (west→east)
// surfaceArea = 4π r² using real km radii
// ═══════════════════════════════════════════════════
const PD = [
  {
    name:'Mercury',type:'Terrestrial Planet',color:'#b8b8b4',emissive:'#252522',
    radius:.42,orbitRadius:8.5,orbitSpeed:4.74,rotSpeed:.0025,retrograde:false,tilt:.03,
    diameter:'4,879 km',surfaceArea:'74.8 million km²',
    orbitalPeriod:'88 Earth days',distFromSun:'57.9M km',avgTemp:'167°C',moons:'0',
    desc:'Smallest planet; closest to Sun. Extreme thermal swings — from −180°C nights to 430°C days. No atmosphere to retain heat.',
    rings:false,
  },
  {
    name:'Venus',type:'Terrestrial Planet',color:'#e8c87a',emissive:'#5a2a00',
    radius:.94,orbitRadius:13,orbitSpeed:3.50,rotSpeed:.0007,retrograde:true,tilt:177.4,
    diameter:'12,104 km',surfaceArea:'460.2 million km²',
    orbitalPeriod:'225 Earth days',distFromSun:'108.2M km',avgTemp:'464°C',moons:'0',
    desc:'Hottest planet — runaway greenhouse via dense CO₂. Spins BACKWARDS (retrograde) and extremely slowly; a day on Venus is longer than its year.',
    rings:false,hasAtmo:true,atmoColor:'#e8a040',
  },
  {
    name:'Earth',type:'Terrestrial Planet',color:'#2a80d4',emissive:'#082008',
    radius:1.0,orbitRadius:18,orbitSpeed:2.98,rotSpeed:.012,retrograde:false,tilt:23.4,
    diameter:'12,742 km',surfaceArea:'510.1 million km²',
    orbitalPeriod:'365.25 days',distFromSun:'149.6M km',avgTemp:'15°C',moons:'1',
    desc:'Our home — only known planet harboring life. Liquid water, plate tectonics, and a magnetic field make it uniquely habitable.',
    rings:false,hasAtmo:true,atmoColor:'#4488ff',
  },
  {
    name:'Mars',type:'Terrestrial Planet',color:'#c0420e',emissive:'#300800',
    radius:.55,orbitRadius:25,orbitSpeed:2.41,rotSpeed:.0098,retrograde:false,tilt:25.2,
    diameter:'6,779 km',surfaceArea:'144.8 million km²',
    orbitalPeriod:'687 Earth days',distFromSun:'227.9M km',avgTemp:'−65°C',moons:'2',
    desc:'The Red Planet hosts Olympus Mons (solar system\'s tallest volcano) and Valles Marineris. Evidence of ancient liquid water rivers.',
    rings:false,hasAtmo:true,atmoColor:'#c04020',
  },
  {
    name:'Jupiter',type:'Gas Giant',color:'#c88a38',emissive:'#301400',
    radius:3.3,orbitRadius:38,orbitSpeed:1.31,rotSpeed:.026,retrograde:false,tilt:3.1,
    diameter:'139,820 km',surfaceArea:'61.42 billion km²',
    orbitalPeriod:'11.9 Earth years',distFromSun:'778.5M km',avgTemp:'−110°C',moons:'95',
    desc:'Largest planet — 2.5× mass of all others combined. Great Red Spot is a 350+ year-old storm. Magnetic field 20,000× stronger than Earth\'s.',
    rings:false,bands:true,
  },
  {
    name:'Saturn',type:'Gas Giant',color:'#e2cf88',emissive:'#302000',
    radius:2.75,orbitRadius:52,orbitSpeed:.97,rotSpeed:.022,retrograde:false,tilt:26.7,
    diameter:'116,460 km',surfaceArea:'42.7 billion km²',
    orbitalPeriod:'29.5 Earth years',distFromSun:'1.43B km',avgTemp:'−140°C',moons:'146',
    desc:'Iconic rings span 282,000 km yet only ~100m thick — ice and rock. Least dense planet; it would float on water.',
    rings:true,ringColor:'#c8b070',ringOpacity:.6,
  },
  {
    name:'Uranus',type:'Ice Giant',color:'#7adce8',emissive:'#00282a',
    radius:1.85,orbitRadius:64,orbitSpeed:.68,rotSpeed:.014,retrograde:true,tilt:97.8,
    diameter:'50,724 km',surfaceArea:'8.08 billion km²',
    orbitalPeriod:'84 Earth years',distFromSun:'2.87B km',avgTemp:'−195°C',moons:'28',
    desc:'Rotates on its side (97.8° tilt) AND spins BACKWARDS — likely knocked sideways by an ancient collision. Coldest planetary atmosphere in the solar system.',
    rings:true,ringColor:'#7adce8',ringOpacity:.32,
  },
  {
    name:'Neptune',type:'Ice Giant',color:'#4060e0',emissive:'#000830',
    radius:1.78,orbitRadius:76,orbitSpeed:.54,rotSpeed:.016,retrograde:false,tilt:28.3,
    diameter:'49,244 km',surfaceArea:'7.62 billion km²',
    orbitalPeriod:'164.8 Earth years',distFromSun:'4.5B km',avgTemp:'−200°C',moons:'16',
    desc:'Windiest planet — supersonic gusts exceed 2,100 km/h. Great Dark Spot rivals Jupiter\'s storm. Takes 165 years for one full orbit.',
    rings:false,
  },
];

// ═══════════════════════════════════════════════════
// RENDERER + SCENE + CAMERA
// ═══════════════════════════════════════════════════
const ctr = document.getElementById('cv');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
ctr.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000008);

const camera = new THREE.PerspectiveCamera(55, W()/H(), 0.1, 6000);
camera.position.set(0, 65, 125);
camera.lookAt(0, 0, 0);

// ── Starfield ──
(() => {
  const N = 14000;
  const pos = new Float32Array(N*3), col = new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const r=900+Math.random()*1400;
    const th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
    pos[i*3]  =r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);
    pos[i*3+2]=r*Math.cos(ph);
    const b=.5+Math.random()*.5, h=Math.random();
    if(h<.18){col[i*3]=b*.7;col[i*3+1]=b*.85;col[i*3+2]=b;}
    else if(h<.36){col[i*3]=b;col[i*3+1]=b*.85;col[i*3+2]=b*.55;}
    else{col[i*3]=b;col[i*3+1]=b;col[i*3+2]=b;}
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.65,vertexColors:true,sizeAttenuation:true})));
})();

// ── Sun ──
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(5.2,64,64),
  new THREE.MeshBasicMaterial({color:0xffee44})
);
scene.add(sun);
[{s:1.12,c:0xff8800,o:.07},{s:1.30,c:0xff5500,o:.038},{s:1.58,c:0xff2200,o:.018}].forEach(g=>{
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(5.2*g.s,32,32),
    new THREE.MeshBasicMaterial({color:g.c,transparent:true,opacity:g.o,side:THREE.BackSide})
  ));
});
scene.add(new THREE.PointLight(0xfff0dd,4.2,1600));
scene.add(new THREE.AmbientLight(0x101428,0.45));

// ═══════════════════════════════════════════════════
// BUILD PLANETS
// ═══════════════════════════════════════════════════
const pObjs = [];
let showOrbits=true, showLabels=true;

PD.forEach((d,idx)=>{
  // ── Orbit line — BRIGHT, clearly visible white ──
  const pts=[];
  for(let i=0;i<=300;i++){
    const a=(i/300)*Math.PI*2;
    pts.push(new THREE.Vector3(Math.cos(a)*d.orbitRadius,0,Math.sin(a)*d.orbitRadius));
  }
  const orbitLine=new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:0xe8f4ff,transparent:true,opacity:.62})
  );
  scene.add(orbitLine);

  // ── Planet ──
  const planet = new THREE.Mesh(
    new THREE.SphereGeometry(d.radius,52,52),
    new THREE.MeshPhongMaterial({
      color:new THREE.Color(d.color),
      emissive:new THREE.Color(d.emissive),
      shininess:d.type==='Gas Giant'?6:22,
      specular:new THREE.Color(0x1a2a3a),
    })
  );
  planet.castShadow=true; planet.receiveShadow=true;

  const tGrp=new THREE.Group();
  tGrp.rotation.z=THREE.MathUtils.degToRad(d.tilt);
  tGrp.add(planet);

  if(d.hasAtmo){
    tGrp.add(new THREE.Mesh(
      new THREE.SphereGeometry(d.radius*1.1,32,32),
      new THREE.MeshBasicMaterial({color:new THREE.Color(d.atmoColor),transparent:true,opacity:.09,side:THREE.BackSide})
    ));
  }

  if(d.rings){
    const r=new THREE.Mesh(
      new THREE.RingGeometry(d.radius*1.45,d.radius*2.6,128),
      new THREE.MeshBasicMaterial({color:new THREE.Color(d.ringColor||'#c8b870'),transparent:true,opacity:d.ringOpacity||.55,side:THREE.DoubleSide})
    );
    r.rotation.x=Math.PI/2;
    tGrp.add(r);
  }

  const grp=new THREE.Group();
  grp.add(tGrp);
  scene.add(grp);

  pObjs.push({d,grp,planet,tGrp,orbitLine,angle:(idx/PD.length)*Math.PI*2});
});

// ── HTML Labels ──
const lblEls=[];
pObjs.forEach(o=>{
  const el=document.createElement('div');
  el.style.cssText='position:fixed;pointer-events:none;z-index:12;font-family:var(--font-d);font-size:9px;'+
    'letter-spacing:.12em;color:rgba(0,212,255,.74);text-shadow:0 0 8px rgba(0,212,255,.5);transform:translateX(-50%);';
  el.textContent=o.d.name.toUpperCase();
  document.body.appendChild(el);
  lblEls.push(el);
});

// ═══════════════════════════════════════════════════
// CAMERA CONTROLS (drag + scroll + pinch)
// ═══════════════════════════════════════════════════
const INIT_SPH = {th:.32,ph:.78,r:130};
let sph={...INIT_SPH}, tsph={...INIT_SPH};
let focusTgt=new THREE.Vector3(), camTgt=new THREE.Vector3();
let selPlanet=null;

let drag=false,lx=0,ly=0;
renderer.domElement.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  tsph.th-=(e.clientX-lx)*.005;
  tsph.ph=Math.max(.08,Math.min(Math.PI-.08,tsph.ph+(e.clientY-ly)*.005));
  lx=e.clientX;ly=e.clientY;
});
renderer.domElement.addEventListener('wheel',e=>{
  e.preventDefault();
  tsph.r=Math.max(10,Math.min(320,tsph.r+e.deltaY*.1));
},{passive:false});

// Pinch zoom
let t1=null,t2=null,pd0=0;
renderer.domElement.addEventListener('touchstart',e=>{
  if(e.touches.length===1){t1={x:e.touches[0].clientX,y:e.touches[0].clientY};t2=null;}
  if(e.touches.length===2){
    t1={x:e.touches[0].clientX,y:e.touches[0].clientY};
    t2={x:e.touches[1].clientX,y:e.touches[1].clientY};
    pd0=Math.hypot(t2.x-t1.x,t2.y-t1.y);
  }
},{passive:true});
renderer.domElement.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&t1&&!t2){
    const dx=e.touches[0].clientX-t1.x,dy=e.touches[0].clientY-t1.y;
    tsph.th-=dx*.006;
    tsph.ph=Math.max(.08,Math.min(Math.PI-.08,tsph.ph+dy*.006));
    t1={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
  if(e.touches.length===2&&t2){
    const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    tsph.r=Math.max(10,Math.min(320,tsph.r-(d-pd0)*.35));
    pd0=d;
  }
},{passive:true});

// ═══════════════════════════════════════════════════
// RAYCASTING
// ═══════════════════════════════════════════════════
const ray=new THREE.Raycaster(), ms=new THREE.Vector2();
const tip=document.getElementById('tip'), fring=document.getElementById('fring');

renderer.domElement.addEventListener('mousemove',e=>{
  ms.x=(e.clientX/W())*2-1; ms.y=-(e.clientY/H())*2+1;
  ray.setFromCamera(ms,camera);
  const hits=ray.intersectObjects(pObjs.map(o=>o.planet));
  if(hits.length){
    const obj=pObjs.find(o=>o.planet===hits[0].object);
    tip.style.display='block';
    tip.style.left=(e.clientX+15)+'px';
    tip.style.top=(e.clientY-8)+'px';
    tip.textContent=obj.d.name.toUpperCase();
    document.body.style.cursor='pointer';
  } else {
    tip.style.display='none';
    document.body.style.cursor='crosshair';
  }
});
renderer.domElement.addEventListener('click',e=>{
  if(Math.abs(e.movementX||0)>4||Math.abs(e.movementY||0)>4)return;
  ms.x=(e.clientX/W())*2-1; ms.y=-(e.clientY/H())*2+1;
  ray.setFromCamera(ms,camera);
  const hits=ray.intersectObjects(pObjs.map(o=>o.planet));
  if(hits.length) selectPlanet(pObjs.find(o=>o.planet===hits[0].object));
});

// ═══════════════════════════════════════════════════
// LEFT PANEL
// ═══════════════════════════════════════════════════
const lp=document.getElementById('lpanel');
lp.innerHTML='<div class="ptitle">Navigation</div>';
pObjs.forEach((obj,idx)=>{
  const b=document.createElement('button');
  b.className='pbtn'; b.id='pb'+idx;
  const retro=obj.d.retrograde?'<span class="rtag">↺RETRO</span>':'';
  b.innerHTML=`<div class="pdot" style="background:${obj.d.color};box-shadow:0 0 7px ${obj.d.color}88"></div>
    <span>${obj.d.name}</span>${retro}<span class="pau">${obj.d.orbitRadius}AU</span>`;
  b.addEventListener('click',()=>selectPlanet(obj));
  lp.appendChild(b);
  obj.btn=b;
});

// ═══════════════════════════════════════════════════
// SELECT PLANET
// ═══════════════════════════════════════════════════
const ip=document.getElementById('ipanel');
function selectPlanet(obj){
  selPlanet=obj;
  pObjs.forEach((_,i)=>document.getElementById('pb'+i).classList.remove('active'));
  obj.btn.classList.add('active');
  const wp=new THREE.Vector3();
  obj.planet.getWorldPosition(wp);
  focusTgt.copy(wp);
  tsph.r=Math.max(obj.d.radius*7+10,18);

  const d=obj.d;
  document.getElementById('ip-nm').textContent=d.name;
  document.getElementById('ip-ty').textContent=d.type;
  document.getElementById('ip-cb').style.background=`linear-gradient(90deg,${d.color},transparent)`;
  document.getElementById('ip-dm').textContent=d.diameter;
  document.getElementById('ip-sa').textContent=d.surfaceArea;
  document.getElementById('ip-op').textContent=d.orbitalPeriod;
  document.getElementById('ip-ds').textContent=d.distFromSun;
  document.getElementById('ip-tm').textContent=d.avgTemp;
  document.getElementById('ip-mn').textContent=d.moons;
  document.getElementById('ip-rt').textContent=d.retrograde?'↺ Retrograde':'↻ Prograde';
  document.getElementById('ip-rb').style.display=d.retrograde?'flex':'none';
  document.getElementById('ip-dc').textContent=d.desc;
  ip.classList.add('vis');
  fring.style.opacity='1';
}

// ═══════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════
let paused=false, spd=1;
const spsl=document.getElementById('spsl'), spld=document.getElementById('spld');

document.getElementById('bp').addEventListener('click',function(){
  paused=!paused;this.textContent=paused?'▶':'⏸';this.classList.toggle('active',paused);
});
spsl.addEventListener('input',()=>{spd=parseFloat(spsl.value);spld.textContent=spd.toFixed(1)+'×';});
document.getElementById('bsl').addEventListener('click',()=>{spd=Math.max(.1,+(spd-.5).toFixed(1));spsl.value=spd;spld.textContent=spd.toFixed(1)+'×';});
document.getElementById('bfa').addEventListener('click',()=>{spd=Math.min(10,+(spd+.5).toFixed(1));spsl.value=spd;spld.textContent=spd.toFixed(1)+'×';});

document.getElementById('bor').addEventListener('click',function(){
  showOrbits=!showOrbits;this.classList.toggle('active',showOrbits);
  pObjs.forEach(o=>o.orbitLine.visible=showOrbits);
});
document.getElementById('blb').addEventListener('click',function(){
  showLabels=!showLabels;this.classList.toggle('active',showLabels);
  lblEls.forEach(el=>el.style.opacity=showLabels?'1':'0');
});

// ── FULL RESET ──
const INIT_ANGLES = pObjs.map((_,i)=>(i/PD.length)*Math.PI*2);
function fullReset(){
  tsph={...INIT_SPH}; sph={...INIT_SPH};
  focusTgt.set(0,0,0); camTgt.set(0,0,0);
  camera.position.set(0,65,125); camera.lookAt(0,0,0);
  selPlanet=null;
  ip.classList.remove('vis');
  fring.style.opacity='0';
  pObjs.forEach((o,i)=>{
    document.getElementById('pb'+i).classList.remove('active');
    o.angle=INIT_ANGLES[i]; // reset orbital positions
  });
  paused=false; spd=1; spsl.value=1; spld.textContent='1.0×';
  document.getElementById('bp').textContent='⏸';
  document.getElementById('bp').classList.remove('active');
  elapsed=0;
  document.getElementById('tdisp').textContent='T+00:00:00';
}
document.getElementById('brs').addEventListener('click',fullReset);

// ── DOWNLOAD ──
document.getElementById('dlbtn').addEventListener('click',()=>{
  const blob=new Blob([document.documentElement.outerHTML],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='solaris-solar-system-explorer.html';
  a.click(); URL.revokeObjectURL(a.href);
});

// ═══════════════════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════════════════
const clock=new THREE.Clock();
let elapsed=0;
function updateTime(dt){
  elapsed+=dt*spd;
  const s=Math.floor(elapsed)%60, m=Math.floor(elapsed/60)%60, h=Math.floor(elapsed/3600);
  document.getElementById('tdisp').textContent=
    `T+${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05);

  if(!paused){
    updateTime(dt);
    sun.rotation.y+=dt*.08*spd;
    pObjs.forEach(o=>{
      // All planets orbit the Sun in the same prograde direction
      o.angle+=dt*o.d.orbitSpeed*.08*spd;
      o.grp.position.set(
        Math.cos(o.angle)*o.d.orbitRadius,
        0,
        Math.sin(o.angle)*o.d.orbitRadius
      );
      // Self-spin: retrograde = opposite direction
      const spinDir = o.d.retrograde ? -1 : 1;
      o.planet.rotation.y+=dt*o.d.rotSpeed*spd*spinDir;
    });
  }

  // Smooth spherical camera interpolation
  sph.th+=(tsph.th-sph.th)*.09;
  sph.ph+=(tsph.ph-sph.ph)*.09;
  sph.r +=(tsph.r -sph.r )*.09;

  if(selPlanet){
    const wp=new THREE.Vector3();
    selPlanet.planet.getWorldPosition(wp);
    focusTgt.lerp(wp,.07);
  } else {
    focusTgt.lerp(new THREE.Vector3(0,0,0),.05);
  }
  camTgt.lerp(focusTgt,.07);

  const sp=Math.sin(sph.ph);
  camera.position.set(
    camTgt.x+sph.r*sp*Math.sin(sph.th),
    camTgt.y+sph.r*Math.cos(sph.ph),
    camTgt.z+sph.r*sp*Math.cos(sph.th)
  );
  camera.lookAt(camTgt);

  // Labels
  pObjs.forEach((o,idx)=>{
    const wp=new THREE.Vector3();
    o.planet.getWorldPosition(wp);
    const pr=wp.clone().project(camera);
    const sx=(pr.x*.5+.5)*W(), sy=(-(pr.y*.5)+.5)*H();
    const el=lblEls[idx];
    el.style.display=(pr.z>1||!showLabels)?'none':'block';
    el.style.left=sx+'px';
    el.style.top=(sy-o.d.radius*16-10)+'px';
  });

  // Focus ring
  if(selPlanet){
    const wp=new THREE.Vector3();
    selPlanet.planet.getWorldPosition(wp);
    const pr=wp.clone().project(camera);
    const sx=(pr.x*.5+.5)*W(), sy=(-(pr.y*.5)+.5)*H();
    const d3=camera.position.distanceTo(wp);
    const scR=(selPlanet.d.radius/d3)*(H()/(2*Math.tan(camera.fov*Math.PI/360)))*2+16;
    fring.style.left=sx+'px'; fring.style.top=sy+'px';
    fring.style.width=(scR*2)+'px'; fring.style.height=(scR*2)+'px';
    fring.style.opacity=pr.z>1?'0':'1';
  }

  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=W()/H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
});

// BOOT
setTimeout(()=>{
  document.getElementById('load').classList.add('gone');
  document.getElementById('dlbtn').style.display='flex';
  animate();
},2200);
</script>
</body>
</html>
